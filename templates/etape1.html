<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étape 1 | Informations Personnelles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .glass-form { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; width: 100%; max-width: 600px; margin: auto; }
        .progress-bar { background: linear-gradient(90deg, #00ff88, #00bdff); }
        .form-control { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; padding: 12px 15px !important; border-radius: 12px !important; }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 5px; margin-left: 5px; display: block; }
        .btn-next { background: #00ff88; color: #000; font-weight: 800; padding: 15px; border-radius: 15px; width: 100%; border: none; transition: 0.3s; margin-top: 20px; }
        .btn-next:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-form">
        <div class="progress-container mb-4">
            <div class="d-flex justify-content-between mb-2 small fw-bold text-uppercase">
                <span class="text-success">Identité</span>
                <span class="text-secondary">Étape 1/3</span>
            </div>
            <div class="progress" style="height: 6px; background: rgba(255,255,255,0.1);">
                <div class="progress-bar" style="width: 33%"></div>
            </div>
        </div>

        <h4 class="mb-4 fw-bold"><i class="fas fa-user-edit me-2 text-success"></i>Vos Informations</h4>

        <form action="/etape2" method="POST" id="formIdentite">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Nom</label>
                    <input type="text" name="nom" class="form-control" placeholder="Ex: YAO" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Prénom(s)</label>
                    <input type="text" name="prenom" class="form-control" placeholder="Ex: Jean-Marc" required>
                </div>
            </div>

            <div class="mb-3">
                <label>Date de naissance</label>
                <input type="date" name="date_naissance" id="date_naissance" class="form-control" required onchange="verifierAge()">
                <div id="ageError" class="text-danger small mt-1" style="display:none;">
                    <i class="fas fa-exclamation-circle"></i> Vous devez avoir au moins 18 ans pour continuer.
                </div>
            </div>

            <div class="mb-3">
                <label>Ville de résidence (Côte d'Ivoire)</label>
                <input list="villes" name="lieu" class="form-control" placeholder="Tapez pour rechercher une ville..." required>
                <datalist id="villes">
                    <option value="Abidjan">
                    <option value="Yamoussoukro">
                    <option value="Bouaké">
                    <option value="San-Pédro">
                    <option value="Daloa">
                </datalist>
            </div>

            <button type="submit" id="submitBtn" class="btn-next" disabled>SUIVANT</button>
        </form>
        </div>
</div>

<script>
    function verifierAge() {
        const dateNaissance = document.getElementById('date_naissance').value;
        const btn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('ageError');

        if (!dateNaissance) return;

        const aujourdhui = new Date();
        const naissance = new Date(dateNaissance);
        let age = aujourdhui.getFullYear() - naissance.getFullYear();
        const m = aujourdhui.getMonth() - naissance.getMonth();

        if (m < 0 || (m === 0 && aujourdhui.getDate() < naissance.getDate())) {
            age--;
        }

        if (age >= 18) {
            btn.disabled = false;
            errorMsg.style.display = 'none';
            document.getElementById('date_naissance').style.borderColor = '#00ff88';
        } else {
            btn.disabled = true;
            errorMsg.style.display = 'block';
            document.getElementById('date_naissance').style.borderColor = '#ff4b2b';
        }
    }
</script>

</body>
</html>
