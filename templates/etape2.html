<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étape 2 | Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; font-family: sans-serif; }
        .glass-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 40px; width: 100%; max-width: 450px; margin: auto; text-align: center; }
        .form-control { background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; padding: 15px !important; border-radius: 12px !important; font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        .btn-submit { background: #00ff88; color: #000; font-weight: bold; padding: 15px; border-radius: 12px; width: 100%; border: none; font-size: 1.1rem; cursor: pointer; }
        .btn-submit:hover { background: #00e67a; }
        .progress-bar { background: #00ff88; width: 66%; height: 6px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="mb-4">
            <div class="d-flex justify-content-between small mb-1">
                <span>CONTACT</span>
                <span>Étape 2/3</span>
            </div>
            <div style="background: rgba(255,255,255,0.1); border-radius: 10px;"><div class="progress-bar"></div></div>
        </div>

        <h3 class="fw-bold mb-3">Dernière étape</h3>
        <p class="text-secondary small mb-4">Entrez votre numéro pour valider l'envoi de votre dossier.</p>

        <form action="/etape3" method="POST">
            <input type="tel" 
                   name="telephone" 
                   class="form-control" 
                   placeholder="Ex: 0720289836" 
                   required 
                   pattern="[0-9]{10}">
            
            <button type="submit" class="btn-submit">
                VALIDER MA DEMANDE
            </button>
        </form>

        <p class="mt-4 small text-muted">🔒 Vos données sont sécurisées</p>
    </div>
</div>

</body>
</html>
