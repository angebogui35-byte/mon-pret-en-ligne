<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Prêt en Ligne | Solutions de Financement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --secondary: #00bdff; --dark: #0f172a; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Fond avec lueur */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            z-index: -1;
        }

        /* HEADER & LOGO */
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-decoration: none;
            color: white !important;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 45px; height: 45px; display: inline-flex;
            align-items: center; justify-content: center;
            border-radius: 12px; margin-right: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .hero-section { min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 60px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 800px; width: 100%;
        }

        .logo-green { color: var(--primary); text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .main-title { font-size: 3rem; font-weight: 800; line-height: 1.1; margin-bottom: 25px; }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 800; padding: 22px 50px;
            border-radius: 20px; font-size: 1.3rem; text-decoration: none;
            display: inline-block; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none; box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        .btn-premium:hover { transform: scale(1.05) translateY(-5px); color: #000; }
        
        .feature-badge { background: rgba(0, 255, 136, 0.1); padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 25px; display: inline-block; border: 1px solid rgba(0, 255, 136, 0.2); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar pt-4">
        <div class="container justify-content-center">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <div class="logo-icon">
                    <i class="fas fa-hand-holding-usd text-dark"></i>
                </div>
                <span>MON <span class="logo-green">PRÊT</span> EN LIGNE</span>
            </a>
        </div>
    </nav>

    <section class="hero-section container">
        <div class="glass-card text-center">
            <div class="feature-badge">PLATEFORME SÉCURISÉE 2026</div>
            <h1 class="main-title">Votre financement<br><span class="logo-green">instantané</span> sans dossier.</h1>
            <p class="lead text-secondary mb-5">
                Besoin d'un coup de pouce ? Obtenez jusqu'à <strong>150.000 FCFA</strong> versés directement sur votre compte mobile en moins de 10 minutes.
            </p>
            
            <a href="/etape1" class="btn-premium mb-4">
                DÉMARRER MA DEMANDE <i class="fas fa-bolt ms-2"></i>
            </a>

            <div class="row mt-4 opacity-50">
                <div class="col-4"><small><i class="fas fa-shield-alt d-block mb-1"></i> Sécurisé</small></div>
                <div class="col-4"><small><i class="fas fa-bolt d-block mb-1"></i> Rapide</small></div>
                <div class="col-4"><small><i class="fas fa-mobile-alt d-block mb-1"></i> 100% Mobile</small></div>
            </div>
        </div>
    </section>
</body>
</html>
